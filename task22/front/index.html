<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FCM Test Demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-5">
  <div class="card shadow p-4">
    <h3 class="mb-3">🔥 Firebase Push Notification Test</h3>

    <button id="getTokenBtn" class="btn btn-primary mb-3">
      Get FCM Token
    </button>

    <textarea id="tokenBox" class="form-control mb-3" rows="5"
      placeholder="Your FCM token will appear here"></textarea>

    <button id="sendTestBtn" class="btn btn-success">
      Send Test Notification
    </button>

    <div id="status" class="mt-3"></div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-messaging-compat.js"></script>

<script type="module" src="./firebase.js"></script>
<script type="module" src="./app.js"></script>

</body>
</html>
